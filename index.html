<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <main class="container mt-4">
        <header class="mb-4">
            <h1>Task Manager</h1>
            <p class="lead">Organize your work efficiently.</p>
        </header>

        <section class="card p-3 mb-3">
            <h2>Add New Task</h2>
            <form id="task-form">
                <div class="mb-3">
                    <label for="task-input" class="form-label">Task</label>
                    <input type="text" id="task-input" class="form-control" placeholder="Enter a task">
                </div>
                <button type="submit" class="btn btn-primary">Add Task</button>
            </form>
        </section>

        <section class="card p-3 mb-3">
            <h2>Search Tasks</h2>
            <input type="text" id="search-input" class="form-control" placeholder="Search tasks">
        </section>

        <section class="card p-3 mb-3">
            <h2>Filter Tasks</h2>
            <div class="btn-group">
                <button id="show-all" class="btn btn-secondary">All</button>
                <button id="show-active" class="btn btn-secondary">Active</button>
                <button id="show-completed" class="btn btn-secondary">Completed</button>
            </div>
        </section>

        <section class="card p-3 mb-3">
            <h2>Statistics</h2>
            <ul class="list-group">
                <li class="list-group-item">
                    Total Tasks: <span id="total-count" aria-live="polite">0</span>
                </li>
                <li class="list-group-item">
                    Completed: <span id="completed-count" aria-live="polite">0</span>
                </li>
                <li class="list-group-item">
                    Remaining: <span id="remaining-count" aria-live="polite">0</span>
                </li>
            </ul>
        </section>

        <section class="card p-3">
            <h2>Your Tasks</h2>
            <ul id="task-list" class="list-group">
                <!-- Tasks appear here -->
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
